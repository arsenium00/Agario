<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Agar Node.js</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
      text-align: center;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.92);
      padding: 40px 50px;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(0, 255, 100, 0.5);
      z-index: 100;
    }
    input, button {
      display: block;
      width: 300px;
      margin: 12px auto;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
    }
    button {
      background: #00ff44;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }
    button:hover {
      background: #00ff88;
    }
    #gameContainer {
      display: none;
      position: relative;
      width: 960px;
      height: 640px;
      margin: 20px auto;
    }
    canvas {
      background: #112211;
      border: 6px solid #00aa22;
      box-shadow: 0 0 40px rgba(0, 255, 80, 0.6);
    }
    #hud {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.7);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 22px;
      pointer-events: none;
    }
    #leaderboard {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0,0,0,0.7);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 15px;
      text-align: left;
      min-width: 180px;
    }
  </style>
</head>
<body>

  <div id="menu">
    <h1>AGAR NODE</h1>
    <input id="nickname" type="text" placeholder="Твой ник" value="Игрок" maxlength="14">
    <button id="playBtn">ИГРАТЬ</button>
    <p style="margin-top:20px; font-size:14px;">Игра работает по локальной сети и через интернет</p>
  </div>

  <div id="gameContainer">
    <canvas id="canvas" width="960" height="640"></canvas>
    <div id="hud">Размер: <span id="sizeDisplay">24</span></div>
    <div id="leaderboard">
      <strong>ТОП 10</strong><br>
      <div id="leaders"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
  <script src="client.js"></script>
</body>
</html>
